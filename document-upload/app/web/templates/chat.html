<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #efeae2;
      --panel: #f7f5f2;
      --user: #dcf8c6;
      --assistant: #ffffff;
      --text: #1f2c34;
      --muted: #667781;
      --border: #d7dbd6;
      --accent: #128c7e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .chat-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 640px;
      margin: 0 auto;
      background: var(--panel);
    }

    .chat-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--accent);
      color: #fff;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 1rem;
    }

    .chat-header p {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      opacity: 0.9;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      max-width: 85%;
      padding: 0.75rem 0.875rem;
      border-radius: 1rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 0.25rem;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border-bottom-left-radius: 0.25rem;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      box-shadow: none;
      font-size: 0.875rem;
      padding: 0;
    }

    .chat-form {
      display: flex;
      gap: 0.75rem;
      padding: 0.875rem;
      border-top: 1px solid var(--border);
      background: #fff;
      position: sticky;
      bottom: 0;
    }

    .chat-form input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.875rem 1rem;
      font-size: 1rem;
    }

    .chat-form button {
      border: 0;
      border-radius: 999px;
      padding: 0 1.125rem;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }

    .chat-form input:disabled,
    .chat-form button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    @media (min-width: 768px) {
      body {
        padding: 1.5rem 0;
      }

      .chat-shell {
        min-height: calc(100vh - 3rem);
        border: 1px solid var(--border);
        border-radius: 1rem;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <main class="chat-shell">
    <header class="chat-header">
      <h1>RAG Chat</h1>
      <p>Ask questions about your uploaded documents.</p>
    </header>

    <section id="messages" class="chat-messages">
      <div class="message system">WebSocket messages will render here.</div>
      <div class="message assistant">Hi. Ask a question and I will answer from the indexed documents.</div>
    </section>

    <form id="chat-form" class="chat-form">
      <input
        id="chat-input"
        name="query"
        type="text"
        placeholder="Ask about your documents..."
        autocomplete="off"
      />
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    const messagesElement = document.getElementById("messages");
    const formElement = document.getElementById("chat-form");
    const inputElement = document.getElementById("chat-input");
    const submitButton = formElement.querySelector("button");

    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const socket = new WebSocket(`${protocol}//${window.location.host}/ws/chat`);

    let activeAssistantMessage = null;
    let isWaitingForResponse = false;

    function scrollMessagesToBottom() {
      messagesElement.scrollTop = messagesElement.scrollHeight;
    }

    function appendMessage(role, text) {
      const messageElement = document.createElement("div");
      messageElement.className = `message ${role}`;
      messageElement.textContent = text;
      messagesElement.appendChild(messageElement);
      scrollMessagesToBottom();
      return messageElement;
    }

    function createAssistantMessage() {
      activeAssistantMessage = appendMessage("assistant", "");
      return activeAssistantMessage;
    }

    function setWaitingState(isWaiting) {
      isWaitingForResponse = isWaiting;
      inputElement.disabled = isWaiting;
      submitButton.disabled = isWaiting;
    }

    socket.onopen = () => {
      appendMessage("system", "Connected to chat server.");
    };

    socket.onerror = () => {
      appendMessage("system", "WebSocket error. Check the backend logs.");
    };

    socket.onclose = () => {
      setWaitingState(false);
      appendMessage("system", "Disconnected from chat server.");
    };

    socket.onmessage = (event) => {
      const message = JSON.parse(event.data);

      if (message.type === "status") {
        appendMessage("system", message.message);
        return;
      }

      if (message.type === "token") {
        if (activeAssistantMessage === null) {
          createAssistantMessage();
        }

        activeAssistantMessage.textContent += message.value;
        scrollMessagesToBottom();
        return;
      }

      if (message.type === "done") {
        if (activeAssistantMessage === null && message.answer) {
          appendMessage("assistant", message.answer);
        }

        if (!message.answer) {
          appendMessage("system", "No matching context found.");
        }

        activeAssistantMessage = null;
        setWaitingState(false);
        return;
      }

      if (message.type === "error") {
        appendMessage("system", message.message || "Something went wrong.");
        activeAssistantMessage = null;
        setWaitingState(false);
      }
    };

    formElement.addEventListener("submit", (event) => {
      event.preventDefault();

      if (isWaitingForResponse) {
        return;
      }

      const query = inputElement.value.trim();
      if (!query) {
        return;
      }

      if (socket.readyState !== WebSocket.OPEN) {
        appendMessage("system", "Chat connection is not open.");
        return;
      }

      appendMessage("user", query);
      inputElement.value = "";
      activeAssistantMessage = null;
      setWaitingState(true);

      socket.send(JSON.stringify({
        query,
        limit: 3,
      }));
    });
  </script>
</body>
</html>
